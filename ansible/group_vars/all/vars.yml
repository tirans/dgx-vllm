# ============================================================================
# DGX Spark LLM Stack — Configuration
# ============================================================================
# Secrets (hf_token, litellm_master_key) are in vault.yml
# Per-host overrides go in host_vars/<hostname>/vars.yml

# --- Cluster ---
kubeai_namespace: llm-stack
# KubeAI operator image — Docker Hub has working arm64 manifests
# (GHCR ghcr.io/kubeai-project/kubeai has broken multi-arch for arm64)
kubeai_image_repository: substratusai/kubeai
kubeai_image_tag: latest
# Helm chart versions pinned to the known-good deployed set (floating versions
# risk an upstream chart change breaking a re-run). substratusai/kubeai has no
# semver image tag (only :latest), so the chart pin is the reproducibility control.
kubeai_chart_version: "0.23.2"
kubeai_models_chart_version: "0.23.1"
nvidia_device_plugin_chart_version: "0.19.0"
# Max wait for a warm model pod to report Ready. 35B weights can take many
# minutes to load (more on a cold cache); the vLLM pod's own startup budget is ~3h.
model_ready_timeout: 1800
k3s_disable_components:
  - traefik
  # We use the kubernetes.core.helm Ansible module + Helm v3 binary directly,
  # not K3s's embedded HelmChart CRD reconciler. Disabling saves a controller.
  - helm-controller
# Disable K3s's embedded kube-router network-policy controller.
# WHY (reboot resilience): "start networking" is one atomic step that writes the
# flannel CNI config AND starts this controller. After a reboot the controller
# blocks up to 15 MINUTES waiting for the node.cloudprovider.kubernetes.io/
# uninitialized taint to be *removed* — but on an already-initialized node that
# removal transition never fires, so it times out, K3s aborts "start networking"
# (CNI is never written), exits, and systemd restarts it. The loop repeats every
# ~15 min: the node stays NotReady, no pod reschedules, the GPU is never
# advertised. Disabling the controller lets networking finish immediately so the
# node is Ready within seconds of boot. (--node-ip/--flannel-iface alone do NOT
# fix this — they only pin flannel's interface.) See k3s-io/k3s#8281.
# TRADEOFF: Kubernetes NetworkPolicy objects are no longer ENFORCED (kube-router
# is the only enforcer; flannel does not enforce policy). Acceptable on this
# single-node LAN appliance. The now-inert policies in roles/kubeai are skipped
# while this is true. To restore enforcement, deploy a policy-capable CNI such as
# Calico and set this back to false.
k3s_disable_network_policy: true
# Make the NVIDIA container runtime the containerd default via k3s's NATIVE flag.
# k3s auto-detects nvidia-container-runtime and registers the `nvidia` runtime +
# RuntimeClass on its own; this only marks it the default. It REPLACES the old
# custom containerd config.toml.tmpl, which fully replaced k3s's base template and
# dropped the [cri].cni section — leaving containerd with no CNI conf_dir and
# breaking pod networking ("cni plugin not initialized") on every containerd
# restart/reboot. Every GPU pod already sets runtimeClassName: nvidia, so set this
# to "" to keep the runc default if you ever prefer that.
k3s_default_runtime: nvidia
k3s_kubeconfig_mode: "600"
k3s_max_pods: 64
# Pin K3s to a single IPv4 address and interface. Without this, on hosts
# that also have a global IPv6 address (SLAAC), the embedded network-policy
# controller can hang waiting for the `node.cloudprovider.kubernetes.io/
# uninitialized` taint to be removed, K3s shuts itself down after its 15m
# internal deadline, systemd restarts it, and the CNI conflist is never
# written — kubelet stays in "cni plugin not initialized". Related upstream:
# k3s-io/k3s#8281. Values are resolved from host facts at apply time so no
# real IPs land in the tracked tree (privacy rule in CLAUDE.md).
k3s_node_ip: "{{ ansible_default_ipv4.address }}"
k3s_flannel_iface: "{{ ansible_default_ipv4.interface }}"
# Host firewall (ufw) must permit the k3s CIDRs. ufw ships default-deny
# (DEFAULT_INPUT_POLICY=DROP) and k3s/flannel never add ufw rules, so traffic
# from a pod to the hostNetwork kube-apiserver (pod 10.42.x -> ClusterIP
# 10.43.0.1:443 -> node:6443, which lands in the INPUT chain) is silently
# dropped. Every API-dependent controller (kubeai, metrics-server,
# local-path-provisioner, NFD) then times out at startup and CrashLoopBackOffs,
# and CoreDNS never goes Ready — while LiteLLM (no API dependency) stays up, so
# :4000 answers but the model engine behind it is dead. Allowing the pod +
# service CIDRs (and FORWARD ACCEPT for pod egress) is k3s's documented remedy;
# ufw persists the rules and reloads them on boot, so it survives a restart.
# Set manage_ufw: false to opt out (e.g. if ufw is disabled host-wide).
manage_ufw: true
k3s_pod_cidr: "10.42.0.0/16"       # k3s flannel default (cluster-cidr)
k3s_service_cidr: "10.43.0.0/16"   # k3s default (service-cidr)
# Retire the Docker daemon. k3s uses its OWN bundled containerd
# (/run/k3s/containerd/containerd.sock) plus nvidia-container-runtime; nothing
# in this stack uses dockerd — the only "docker" references in the repo are
# Docker Hub image pulls, which containerd performs. A running dockerd is a
# second iptables actor that forces the FORWARD chain policy to DROP and races
# flannel's pod networking across restarts, so we stop+disable+mask it. Set to
# false if you reintroduce a Docker-based workload on this host.
disable_docker: true
# Set to true to wipe K3s and reinstall on the next setup.sh run.
# Required when changing flags that the K3s installer reads at install time
# (e.g. secrets-encryption, audit log paths). Uses scripts/clean-k3s.sh
# with --keep-cache to preserve /data/hf-cache.
k3s_force_reinstall: false
# Kubelet args (defaults are fine, only override max-pods + eviction)
k3s_kubelet_args:
  - "max-pods=64"
  # Eviction threshold tuned for the GB10 unified memory.
  # Default 100Mi is too low when vLLM grabs 65GB+ for model weights.
  - "eviction-hard=memory.available<500Mi,nodefs.available<10%"
# kube-controller-manager args. Default terminated-pod-gc-threshold is
# 12500 — way too high for a single-node cluster. Set to 10 so the GC
# cleans up zombie/Failed/Unknown pods almost immediately after reboots.
k3s_controller_manager_args:
  - "terminated-pod-gc-threshold=10"
# kube-apiserver args — audit logging (CIS recommendation)
k3s_apiserver_args:
  - "audit-log-path=/var/lib/rancher/k3s/server/logs/audit.log"
  - "audit-policy-file=/var/lib/rancher/k3s/server/audit.yaml"
  - "audit-log-maxage=30"
  - "audit-log-maxbackup=10"
  - "audit-log-maxsize=100"

# --- GPU / Hardware ---
gpu_memory_utilization: "0.7"
enforce_eager: true
min_disk_gb: 50
min_driver_version: 580
hf_cache_host_path: /data/hf-cache
shared_memory_size: "16Gi"

# --- vLLM ---
# scitrera/dgx-spark-vllm:0.17.0-t5 — released 2026-03-08
# - vLLM 0.17.0 + Transformers 5.x (newer than 0.14.1-t5)
# - Expected to support Qwen 3.5 (qwen3_5_moe architecture)
# - Likely does NOT yet support Gemma 4 (Transformers PR landed 2026-04-01)
# Tag history (Docker Hub scitrera/dgx-spark-vllm):
#   0.17.0-t5  (2026-03-08) — current
#   0.16.0-t5  (2026-03-04)
#   0.15.1-t5  (2026-02-04)
#   0.14.1-t5  (2026-01-26) — previous, Qwen3 only, no Qwen 3.5
vllm_image: "scitrera/dgx-spark-vllm:0.17.0-t5"
vllm_default_args:
  - "--host=0.0.0.0"
  - "--port=8000"
  - "--trust-remote-code"
  - "--gpu-memory-utilization={{ gpu_memory_utilization }}"
  - "--enforce-eager"
  # vLLM 0.17 renamed --disable-log-requests to --no-enable-log-requests
  - "--no-enable-log-requests"
  # Use FP8 KV cache to fit max context windows on the GB10's unified memory.
  # Without this, 256K context per request requires more KV cache than fits.
  - "--kv-cache-dtype=fp8"

# --- Models ---
models:
  # Gemma 4 disabled — requires Transformers >= 4.51 (added 2026-04-01).
  # No pre-built vLLM image supports it yet. Re-enable when a compatible
  # image is available.
  # All models use their native max context window (see CLAUDE.md for rationale).
  # FP8 KV cache (set in vllm_default_args) makes this fit on the GB10.
  gemma4-26b-a4b:
    enabled: false
    owner: google
    url: "hf://google/gemma-4-26B-A4B-it"
    features:
      - TextGeneration
    min_replicas: 0
    max_replicas: 1
    extra_args:
      - "--max-model-len=131072"   # Gemma 4 native max: 128K
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=hermes"
    litellm_aliases:
      - gemma4

  # Qwen 3.5 35B-A3B — primary, runs on 0.17.0-t5 with Transformers 5.x
  qwen36-35b-a3b:
    enabled: true
    owner: qwen
    url: "hf://Qwen/Qwen3.6-35B-A3B-FP8"
    features:
      - TextGeneration
    min_replicas: 1
    max_replicas: 1
    extra_args:
      - "--max-model-len=262144"   # Qwen 3.5 native max: 256K
      - "--enable-auto-tool-choice"
      # qwen3_coder is the right parser for Qwen3.5 instruct (not hermes);
      # qwen3 reasoning parser keeps <think> blocks out of message.content
      # so tool_calls populate correctly. vLLM issue #39056 affects >=0.19.
      - "--tool-call-parser=qwen3_coder"
      - "--reasoning-parser=qwen3"
    litellm_aliases:
      - qwen36
      - gpt-4

  # Qwen 3 30B-A3B — proven fallback, scale from zero
  qwen3-30b-a3b:
    enabled: true
    owner: qwen
    url: "hf://Qwen/Qwen3-30B-A3B-Instruct-2507"
    features:
      - TextGeneration
    min_replicas: 0
    max_replicas: 1
    extra_args:
      - "--max-model-len=262144"   # Qwen 3 native max: 256K
    litellm_aliases:
      - qwen3

# --- LiteLLM ---
litellm_image: "ghcr.io/berriai/litellm:main-stable"
litellm_port: 4000
# One async uvicorn worker is plenty for this GPU-bound proxy. num_workers=2
# doubled the startup import memory and OOMKilled the pod at the old 2Gi cap.
litellm_num_workers: 1
litellm_service_type: LoadBalancer
litellm_router_strategy: "simple-shuffle"
litellm_timeout: 300
litellm_num_retries: 2
litellm_drop_params: true
# Resource sizing. LiteLLM's import storm spikes memory at startup; a 4Gi cap
# gives a single worker ~2.5x headroom. Cheap on the 128GB box. Tune here if you
# raise litellm_num_workers.
litellm_cpu_request: "500m"
litellm_cpu_limit: "2"
litellm_memory_request: "2Gi"
litellm_memory_limit: "4Gi"

# --- Validation ---
validate_cold_start_models: false
validation_timeout_secs: 30
