---
# roles/kubeai/tasks/main.yml — KubeAI operator and model catalog

- name: Create llm-stack namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ kubeai_namespace }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

# Only applied when a policy-capable CNI is enforcing NetworkPolicy. The embedded
# kube-router controller is disabled for reboot resilience (k3s_disable_network_
# policy), under which these policies would be inert — applying them would imply
# an isolation guarantee the cluster does not actually provide. See the header of
# files/network-policies.yaml.
- name: Apply default-deny ingress NetworkPolicies
  when: not (k3s_disable_network_policy | default(false) | bool)
  kubernetes.core.k8s:
    state: present
    src: "{{ role_path }}/files/network-policies.yaml"
    namespace: "{{ kubeai_namespace }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"

- name: Create HuggingFace secret (kubeai-huggingface)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: kubeai-huggingface
        namespace: "{{ kubeai_namespace }}"
      type: Opaque
      stringData:
        token: "{{ hf_token }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
  no_log: true

- name: Create model cache directory
  ansible.builtin.file:
    path: "{{ hf_cache_host_path }}"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Add KubeAI Helm repo
  kubernetes.core.helm_repository:
    name: kubeai
    repo_url: https://www.kubeai.org
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
  register: kubeai_repo
  retries: 5
  delay: 10
  until: kubeai_repo is succeeded

- name: Install KubeAI operator and model catalog
  block:
    - name: Template KubeAI operator values
      ansible.builtin.template:
        src: values-kubeai.yaml.j2
        dest: /tmp/ansible-kubeai-values.yaml
        mode: "0600"

    - name: Install KubeAI operator
      kubernetes.core.helm:
        name: kubeai
        chart_ref: kubeai/kubeai
        chart_version: "{{ kubeai_chart_version }}"
        release_namespace: "{{ kubeai_namespace }}"
        create_namespace: true
        values_files:
          - /tmp/ansible-kubeai-values.yaml
        wait: false
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: kubeai_install
      retries: 5
      delay: 10
      until: kubeai_install is succeeded

    - name: Wait for KubeAI operator to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl -n {{ kubeai_namespace }} wait
          --for=condition=Available deployment/kubeai
          --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      changed_when: false
      retries: 3
      delay: 30
      register: kubeai_wait
      until: kubeai_wait.rc == 0

    - name: Template model catalog values
      ansible.builtin.template:
        src: values-models.yaml.j2
        dest: /tmp/ansible-models-values.yaml
        mode: "0600"

    - name: Install model catalog
      kubernetes.core.helm:
        name: kubeai-models
        chart_ref: kubeai/models
        chart_version: "{{ kubeai_models_chart_version }}"
        release_namespace: "{{ kubeai_namespace }}"
        values_files:
          - /tmp/ansible-models-values.yaml
        wait: true
        wait_timeout: 120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
      register: models_install
      retries: 5
      delay: 10
      until: models_install is succeeded

  always:
    - name: Clean up temp values files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/ansible-kubeai-values.yaml
        - /tmp/ansible-models-values.yaml

- name: List deployed models
  ansible.builtin.command:
    cmd: kubectl -n {{ kubeai_namespace }} get models
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
  register: models_list
  changed_when: false

- name: Display deployed models
  ansible.builtin.debug:
    msg: "{{ models_list.stdout }}"

- name: Wait for warm model pods to be Ready
  ansible.builtin.command:
    cmd: >-
      kubectl -n {{ kubeai_namespace }} wait --for=condition=Ready
      pod -l app=model-{{ item.key }} --timeout={{ model_ready_timeout }}s
  environment:
    KUBECONFIG: "{{ kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
  register: model_ready
  changed_when: false
  failed_when: false
  retries: 5
  delay: 15
  until: model_ready.rc == 0
  loop: "{{ models | dict2items | selectattr('value.enabled', 'equalto', true) | selectattr('value.min_replicas', 'greaterthan', 0) | list }}"
  loop_control:
    label: "{{ item.key }}"

- name: Diagnose any unhealthy pods in the namespace (fails with real cause)
  ansible.builtin.include_role:
    name: diagnostics
  vars:
    diag_namespace: "{{ kubeai_namespace }}"
    diag_context: "Post-deploy health check (KubeAI + models)"
    diag_fail: true
