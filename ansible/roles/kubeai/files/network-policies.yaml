# Managed by Ansible — do not edit manually
# Default-deny ingress with explicit allow rules for the LLM stack.
# Egress is unrestricted (HF model downloads, image pulls need it).
#
# NOTE: These policies are ENFORCED only when a policy-capable CNI is running.
# This stack disables K3s's embedded kube-router controller for reboot
# resilience (see k3s_disable_network_policy in group_vars/all/vars.yml), so
# while that is true the kubeai role SKIPS applying this file and these policies
# are inert. They are kept here ready for a future policy-capable CNI (e.g.
# Calico). flannel on its own does NOT enforce NetworkPolicy.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: llm-stack
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-public
  namespace: llm-stack
spec:
  podSelector:
    matchLabels:
      app: litellm-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 4000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-llm-stack-internal
  namespace: llm-stack
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llm-stack
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-kube-system
  namespace: llm-stack
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
