---
# roles/prerequisites/tasks/main.yml — Install Helm, jq, and other dependencies

- name: Ensure base packages are present
  ansible.builtin.apt:
    name:
      - curl
      - jq
      - python3
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure systemd journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: "0755"

- name: Set journald retention drop-in (cap to 2G)
  ansible.builtin.copy:
    src: journald-llm-stack.conf
    dest: /etc/systemd/journald.conf.d/llm-stack.conf
    mode: "0644"
  notify: Restart journald

- name: Check if uv is in /usr/local/bin
  ansible.builtin.stat:
    path: /usr/local/bin/uv
  register: uv_stat

- name: Install uv to /usr/local/bin
  when: not uv_stat.stat.exists
  ansible.builtin.shell:
    cmd: curl -LsSf --connect-timeout 10 --max-time 120 https://astral.sh/uv/install.sh | sh
  environment:
    UV_INSTALL_DIR: /usr/local/bin
    INSTALLER_NO_MODIFY_PATH: "1"
  register: uv_install_script
  retries: 5
  delay: 10
  until: uv_install_script is succeeded

- name: Install Python dependencies via uv
  ansible.builtin.command:
    cmd: /usr/local/bin/uv pip install --system --break-system-packages kubernetes>=24.2.0
  register: uv_install
  changed_when: "'Installed' in uv_install.stdout"

- name: Check if Helm is installed
  ansible.builtin.command:
    cmd: helm version --short
  register: helm_check
  changed_when: false
  failed_when: false

- name: Install Helm via official script
  when: helm_check.rc != 0
  block:
    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: "0755"
        timeout: 60
      register: helm_script_download
      retries: 5
      delay: 10
      until: helm_script_download is succeeded

    - name: Run Helm install script
      ansible.builtin.command:
        cmd: /tmp/get_helm.sh
      environment:
        DESIRED_VERSION: ""  # empty = latest
      register: helm_install
      changed_when: "'is already latest' not in helm_install.stdout"

    - name: Clean up Helm install script
      ansible.builtin.file:
        path: /tmp/get_helm.sh
        state: absent

- name: Verify Helm is available
  ansible.builtin.command:
    cmd: helm version --short
  register: helm_version
  changed_when: false

- name: Display Helm version
  ansible.builtin.debug:
    msg: "Helm {{ helm_version.stdout }}"

- name: Check if helm-diff plugin is installed
  ansible.builtin.command:
    cmd: helm plugin list
  register: helm_plugins
  changed_when: false
  failed_when: false

- name: Install helm-diff plugin
  ansible.builtin.command:
    cmd: helm plugin install https://github.com/databus23/helm-diff
  when: "'diff' not in helm_plugins.stdout"
  register: helm_diff_install
  changed_when: helm_diff_install.rc == 0
  retries: 5
  delay: 10
  until: helm_diff_install is succeeded

# --- Host networking: make ufw compatible with k3s, retire dockerd -----------
# See manage_ufw / k3s_pod_cidr / k3s_service_cidr / disable_docker in
# group_vars/all/vars.yml for the full rationale. These live in prerequisites
# (which runs before the k3s role) so the host firewall already permits the pod
# CIDR before k3s (re)starts — otherwise every API-dependent pod
# CrashLoopBackOffs after a reboot because pod -> kube-apiserver is dropped by
# ufw's default-deny INPUT policy.

- name: Allow k3s pod CIDR through ufw (pod -> apiserver / host services)
  community.general.ufw:
    rule: allow
    src: "{{ k3s_pod_cidr }}"
    comment: "k3s pod CIDR (flannel)"
  when: manage_ufw | bool

- name: Allow k3s service CIDR through ufw (ClusterIP traffic)
  community.general.ufw:
    rule: allow
    src: "{{ k3s_service_cidr }}"
    comment: "k3s service CIDR"
  when: manage_ufw | bool

- name: Set ufw default FORWARD policy to ACCEPT (flannel pod forwarding)
  community.general.ufw:
    direction: routed
    policy: allow
  when: manage_ufw | bool

- name: Check whether the Docker daemon unit exists
  ansible.builtin.command:
    cmd: systemctl list-unit-files docker.service
  register: docker_unit
  changed_when: false
  failed_when: false

- name: Stop, disable and mask the Docker daemon (unused; conflicts with flannel iptables)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - docker.service
    - docker.socket
  when:
    - disable_docker | bool
    - "'docker.service' in docker_unit.stdout"
