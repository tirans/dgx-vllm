# Managed by Ansible — do not edit manually.
# Prevents k3s starting before DHCP has provided a default route.
# Matches the failure mode in k3s-io/k3s#367 and observed on 2026-04-11.
[Service]
ExecStartPre=/bin/bash -c 'for i in {1..120}; do /usr/sbin/ip route show default 2>/dev/null | grep -q . && exit 0; sleep 1; done; echo "k3s.service: default route not present after 120s, proceeding anyway" >&2; exit 0'
